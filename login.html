<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SISCO-WIFI - Connexion Hotspot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            background: #0f253d;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #1e3a5f;
        }
        
        .header {
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            padding: 30px 20px 20px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        
        /* Logo SW responsive */
        .logo-sw {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 900;
            color: #ffd700;
            letter-spacing: -2px;
            text-shadow: 0 2px 15px rgba(255, 215, 0, 0.4);
            line-height: 1;
        }
        
        /* Titre Sisco-Wi-Fi responsive */
        .logo-sisco {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 5vw, 1.6rem);
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 2px;
            margin-top: 6px;
            text-transform: uppercase;
            text-shadow: 0 1px 8px rgba(255, 215, 0, 0.3);
        }
        
        .content {
            padding: 30px 25px;
        }
        
        .message {
            text-align: center;
            color: #ccc;
            margin-bottom: 25px;
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            line-height: 1.5;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #ffd700;
            font-size: clamp(0.75rem, 3vw, 0.85rem);
        }
        
        input {
            width: 100%;
            padding: 12px 14px;
            background: #fff;
            color: #0a2540;
            border: 2px solid #1e3a5f;
            border-radius: 10px;
            font-size: clamp(0.85rem, 4vw, 1rem);
            outline: none;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }
        
        .btn-connect {
            width: 100%;
            padding: 12px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: clamp(0.9rem, 4.5vw, 1.1rem);
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s;
        }
        
        .btn-connect:hover {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-connect:active {
            transform: translateY(0);
        }
        
        .error-msg {
            background: #dc3545;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            display: none;
        }
        
        .success-msg {
            background: #28a745;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            display: none;
        }
        
        .footer {
            background: #0a1f35;
            padding: 16px;
            text-align: center;
            border-top: 1px solid #1e3a5f;
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            color: #aaa;
        }
        
        .footer-name {
            color: #ffd700;
            font-weight: 700;
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
        }
        
        .footer-info {
            color: #ccc;
            margin-top: 4px;
        }
        
        /* Pour les très petits écrans (moins de 380px) */
        @media (max-width: 380px) {
            .content {
                padding: 20px 18px;
            }
            .header {
                padding: 20px 15px 15px;
            }
            .footer {
                padding: 12px;
            }
        }
        
        /* Pour les grands écrans (plus de 1200px) - éviter que ce soit trop large */
        @media (min-width: 1200px) {
            .login-container {
                max-width: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo-sw">SW</div>
            <div class="logo-sisco">Sisco-Wi-Fi</div>
        </div>
        
        <div class="content">
            <div class="message">
                🔐 Veuillez vous connecter pour utiliser le service de hotspot internet
            </div>
            
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Entrez votre nom" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="Entrez votre mot de passe">
            </div>
            
            <button onclick="connecter()" class="btn-connect">
                🔌 Se connecter
            </button>
            
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
        </div>
        
        <div class="footer">
            <div class="footer-name">Francisco</div>
            <div class="footer-info">📘 Fb: Jacklin Nays Francisco</div>
            <div class="footer-info">📞 Tel/WhatsApp: (+261) 032 66 692 01</div>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('sisco_users')) || [];
        
        function connecter() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!username || !password) {
                errorDiv.textContent = "❌ Veuillez remplir tous les champs";
                errorDiv.style.display = 'block';
                return;
            }
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (!user) {
                errorDiv.textContent = "❌ Nom ou mot de passe incorrect. La page va s'actualiser.";
                errorDiv.style.display = 'block';
                setTimeout(() => location.reload(), 1800);
                return;
            }
            
            if (user.blocked === true) {
                errorDiv.textContent = "🔒 Compte bloqué par l'administrateur. Accès refusé.";
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!user.firstUse) {
                user.firstUse = Date.now();
                user.mac = "XX:XX:XX:XX:XX:XX";
                
                let hours = 0;
                switch(user.duration) {
                    case "1h": hours = 1; break;
                    case "12h": hours = 12; break;
                    case "24h": hours = 24; break;
                    case "1semaine": hours = 168; break;
                    case "1mois": hours = 720; break;
                    default: hours = 24;
                }
                user.expires = Date.now() + (hours * 3600000);
                
                localStorage.setItem('sisco_users', JSON.stringify(users));
            }
            
            if (user.expires && Date.now() > user.expires) {
                errorDiv.textContent = "⏰ Votre temps de connexion a expiré. Contactez l'administrateur.";
                errorDiv.style.display = 'block';
                return;
            }
            
            successDiv.textContent = `✅ Connexion réussie ! Bienvenue ${username}`;
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                alert("🌐 Vous êtes maintenant connecté à Internet !\n\n📌 Ticket lié UNIQUEMENT à votre adresse MAC.\n🔁 Dès la première connexion, le compteur est lancé automatiquement.");
            }, 800);
        }
        
        console.log('%c✅ Portail captif SISCO-WIFI chargé - Version responsive', 'color:#ffd700; font-size:14px;');
    </script>
</body>
</html>
