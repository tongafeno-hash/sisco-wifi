<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SISCO-WIFI - Connexion Hotspot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #0a2540, #1e3a5f); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        
        /* Largeur resserrée à 340px pour un mode portrait parfait */
        .login-container { 
            width: 100%; 
            max-width: 340px; 
            background: #0f253d; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            overflow: hidden; 
            border: 1px solid #1e3a5f; 
        }
        
        .header { background: linear-gradient(135deg, #0a2540, #1e3a5f); padding: 25px 20px 15px; text-align: center; border-bottom: 2px solid #ffd700; }
        .logo-sw { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; color: #ffd700; letter-spacing: -2px; text-shadow: 0 2px 15px rgba(255, 215, 0, 0.4); line-height: 1; }
        .logo-sisco { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: #ffd700; letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }
        .content { padding: 25px 20px; }
        .message { text-align: center; color: #ccc; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.4; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #ffd700; font-size: 0.8rem; }
        input { width: 100%; padding: 12px 14px; background: #fff; color: #0a2540; border: 2px solid #1e3a5f; border-radius: 10px; font-size: 0.95rem; outline: none; }
        .btn-connect { width: 100%; padding: 14px 16px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .error-msg { padding: 10px; background: #dc3545; color: white; border-radius: 8px; margin-top: 16px; text-align: center; font-size: 0.8rem; display: none; }
        .footer { background: #0a1f35; padding: 20px 16px; text-align: center; border-top: 1px solid #1e3a5f; font-size: 0.75rem; color: #aaa; }
        .footer-name { color: #ffd700; font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo-sw">SW</div>
            <div class="logo-sisco">Sisco-Wi-Fi</div>
        </div>
        <div class="content">
            <div class="message">🔐 Veuillez vous connecter pour utiliser le service de hotspot internet</div>
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Entrez votre nom">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="Entrez votre mot de passe">
            </div>
            <button onclick="connecter()" class="btn-connect">🔌 Se connecter</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
        <div class="footer">
            <div class="footer-name">Francisco</div>
            <div>📘 Fb: Jacklin Nays Francisco</div>
            <div>📞 Tel/WhatsApp: (+261) 032 66 692 01</div>
        </div>
    </div>
    <script>
        function connecter() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');
            
            if (userIn === "admin" && passIn === "SISCO2026") {
                window.location.href = "http://192.168.1.1:2050/nodogsplash_auth/";
                return;
            }

            const users = JSON.parse(localStorage.getItem('sisco_users')) || [];
            const user = users.find(u => u.username === userIn && u.password === passIn);

            if (!user) {
                err.textContent = "❌ Nom ou mot de passe incorrect.";
                err.style.display = 'block';
                setTimeout(() => location.reload(), 2000);
                return;
            }

            if (user.blocked) {
                err.textContent = "🔒 Ce compte est bloqué.";
                err.style.display = 'block';
                return;
            }

            window.location.href = `http://192.168.1.1:2050/nodogsplash_auth/?username=${userIn}`;
        }
    </script>
</body>
</html>
