<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SISCO-WIFI - Administration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .admin-container {
            max-width: 1300px;
            margin: 0 auto;
            background: #0f253d;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #1e3a5f;
        }
        
        .header {
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        
        .logo-sw {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: -4px;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            line-height: 0.8;
        }
        
        .logo-sisco {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        
        .main-content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 25px;
            border-left: 4px solid #ffd700;
            padding-left: 15px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 100%;
        }
        
        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ffd700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: #fff;
            color: #0a2540;
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-block { background: #dc3545; color: white; }
        .btn-unblock { background: #28a745; color: white; }
        .btn-modify { background: #ffc107; color: #0a2540; }
        .btn-delete { background: #6c757d; color: white; }
        .btn-save {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a2540;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <div class="logo-sw">SW</div>
            <div class="logo-sisco">Sisco-Wi-Fi</div>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h2 class="section-title">Utilisateurs</h2>
                <div class="form-group">
                    <label>Sélectionner</label>
                    <select id="userSelect" onchange="chargerInfos()">
                        <option value="">-- Choisir un client --</option>
                    </select>
                </div>
                <div class="btn-grid">
                    <button class="btn-block" onclick="bloquer()">Bloquer</button>
                    <button class="btn-unblock" onclick="debloquer()">Débloquer</button>
                    <button class="btn-modify" onclick="modifier()">Modifier</button>
                    <button class="btn-delete" onclick="supprimer()">Supprimer</button>
                </div>
            </div>
            
            <div class="card">
                <h2 class="section-title">Nouveau Ticket</h2>
                <div class="form-group">
                    <label>Nom utilisateur</label>
                    <input type="text" id="nomUtilisateur" placeholder="Ex: Client01">
                </div>
                <div class="form-group">
                    <label>Vitesse (Mb/s)</label>
                    <input type="text" id="vitesse" placeholder="Ex: 2 (vide = illimité)">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="text" id="motDePasse" placeholder="Code secret">
                </div>
                <div class="form-group">
                    <label>Durée</label>
                    <select id="duree">
                        <option value="1h">1 heure</option>
                        <option value="12h">12 heures</option>
                        <option value="24h">24 heures</option>
                        <option value="1semaine">1 semaine</option>
                        <option value="1mois">1 mois</option>
                    </select>
                </div>
                <button class="btn-save" onclick="enregistrer()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        // Logique SISCO-WIFI adaptée sans changer le visuel
        let users = JSON.parse(localStorage.getItem('sisco_users')) || [];

        function rafraichir() {
            const select = document.getElementById('userSelect');
            select.innerHTML = '<option value="">-- Choisir un client --</option>';
            users.forEach((u, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = u.username + (u.blocked ? ' (BLOQUÉ)' : '');
                select.appendChild(opt);
            });
        }

        function enregistrer() {
            const user = document.getElementById('nomUtilisateur').value.trim();
            const pass = document.getElementById('motDePasse').value.trim();
            const vit = document.getElementById('vitesse').value.trim();
            const dur = document.getElementById('duree').value;
            const idx = document.getElementById('userSelect').value;

            if (user.length < 1 || pass.length < 2) {
                alert("Erreur : Nom (min 1) et Pass (min 2)");
                return;
            }

            if (idx === "") {
                users.push({ username: user, password: pass, speed: vit, duration: dur, blocked: false });
            } else {
                users[idx] = { ...users[idx], username: user, password: pass, speed: vit, duration: dur };
            }

            localStorage.setItem('sisco_users', JSON.stringify(users));
            alert("Ticket enregistré !");
            location.reload();
        }

        function chargerInfos() {
            const idx = document.getElementById('userSelect').value;
            if (idx !== "") {
                const u = users[idx];
                document.getElementById('nomUtilisateur').value = u.username;
                document.getElementById('motDePasse').value = u.password;
                document.getElementById('vitesse').value = u.speed || "";
                document.getElementById('duree').value = u.duration;
            }
        }

        function bloquer() { modifierStatut(true); }
        function debloquer() { modifierStatut(false); }

        function modifierStatut(b) {
            const i = document.getElementById('userSelect').value;
            if (i === "") return alert("Sélectionnez un client");
            users[i].blocked = b;
            localStorage.setItem('sisco_users', JSON.stringify(users));
            rafraichir();
        }

        function supprimer() {
            const i = document.getElementById('userSelect').value;
            if (i !== "" && confirm("Supprimer ce ticket ?")) {
                users.splice(i, 1);
                localStorage.setItem('sisco_users', JSON.stringify(users));
                location.reload();
            }
        }

        function modifier() {
            const i = document.getElementById('userSelect').value;
            if (i === "") alert("Sélectionnez un client d'abord");
            else alert("Les informations sont chargées à droite. Modifiez et cliquez sur Enregistrer.");
        }

        rafraichir();
    </script>
</body>
</html>
