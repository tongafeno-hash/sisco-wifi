<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SISCO-WIFI - Administration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .admin-container {
            max-width: 1300px;
            margin: 0 auto;
            background: #0f253d;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #1e3a5f;
        }
        
        .admin-header {
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            padding: 20px 30px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo-area {
            text-align: left;
        }
        
        .logo-sw {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 900;
            color: #ffd700;
            letter-spacing: -2px;
            line-height: 1;
        }
        
        .logo-sisco {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.8rem, 3vw, 1rem);
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        .admin-title {
            text-align: right;
        }
        
        .admin-title h1 {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            color: #ffd700;
        }
        
        .admin-title p {
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            color: #aaa;
        }
        
        .admin-content {
            display: flex;
            flex-wrap: wrap;
        }
        
        .sidebar {
            width: 280px;
            background: #0a1f35;
            padding: 25px;
            border-right: 1px solid #1e3a5f;
        }
        
        .sidebar h2 {
            color: #ffd700;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1e3a5f;
        }
        
        .select-container {
            margin-bottom: 25px;
        }
        
        .select-container label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }
        
        select {
            width: 100%;
            padding: 12px;
            background: #1e3a5f;
            color: #fff;
            border: 1px solid #ffd700;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        
        select option {
            background: #0f253d;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-bloquer   { background: #dc3545; }
        .btn-debloquer { background: #28a745; }
        .btn-modifier  { background: #fd7e14; }
        .btn-supprimer { background: #6c757d; }
        
        .main-area {
            flex: 1;
            padding: 25px;
            min-width: 280px;
        }
        
        .ticket-card {
            background: #0a1f35;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #1e3a5f;
        }
        
        .ticket-card h2 {
            color: #ffd700;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ccc;
            font-size: 0.85rem;
        }
        
        .form-group label .required {
            color: #ffd700;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #0a2540;
            border: 2px solid #1e3a5f;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }
        
        .btn-enregistrer {
            background: #007bff;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-enregistrer:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .users-table-section {
            margin-top: 25px;
        }
        
        .users-table-section h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0a1f35;
            border-radius: 10px;
            overflow: hidden;
        }
        
        th {
            background: #1e3a5f;
            color: #ffd700;
            padding: 12px;
            font-size: 0.8rem;
            text-align: left;
        }
        
        td {
            padding: 10px 12px;
            font-size: 0.8rem;
            color: #ddd;
            border-bottom: 1px solid #1e3a5f;
        }
        
        .status-online {
            color: #28a745;
            font-weight: bold;
        }
        
        .status-offline {
            color: #dc3545;
            font-weight: bold;
        }
        
        .status-blocked {
            color: #fd7e14;
            font-weight: bold;
        }
        
        .status-expired {
            color: #6c757d;
            font-weight: bold;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .message-success {
            background: #28a745;
            color: white;
        }
        
        .message-error {
            background: #dc3545;
            color: white;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #1e3a5f;
            }
            
            .admin-header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo-area, .admin-title {
                text-align: center;
            }
            
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
            
            .main-area {
                padding: 15px;
            }
            
            .btn {
                padding: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .sidebar {
                padding: 15px;
            }
            
            .ticket-card {
                padding: 15px;
            }
            
            th, td {
                padding: 8px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="logo-area">
                <div class="logo-sw">SW</div>
                <div class="logo-sisco">Sisco-Wi-Fi</div>
            </div>
            <div class="admin-title">
                <h1>Administration</h1>
                <p>Gestion des tickets hotspot</p>
            </div>
        </div>
        
        <div class="admin-content">
            <div class="sidebar">
                <h2>Utilisateurs</h2>
                
                <div class="select-container">
                    <label>Sélectionner un utilisateur</label>
                    <select id="userSelect">
                        <option value="">-- Sélectionner --</option>
                    </select>
                </div>
                
                <button onclick="bloquerUser()" class="btn btn-bloquer">Bloquer</button>
                <button onclick="debloquerUser()" class="btn btn-debloquer">Débloquer</button>
                <button onclick="modifierUser()" class="btn btn-modifier">Modifier</button>
                <button onclick="supprimerUser()" class="btn btn-supprimer">Supprimer</button>
                
                <div style="margin-top: 30px; text-align: center; font-size: 0.7rem; color: #555;">
                    Conforme au projet SISCO-WIFI.pdf
                </div>
            </div>
            
            <div class="main-area">
                <div id="globalMessage" class="message"></div>
                
                <div class="ticket-card">
                    <h2>Nouveau Ticket</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nom d'utilisateur <span class="required">*</span></label>
                            <input type="text" id="nomUtilisateur" placeholder="Ex: client123" autocomplete="off">
                        </div>
                        
                        <div class="form-group">
                            <label>Mot de passe <span class="required">*</span></label>
                            <input type="password" id="motDePasse" placeholder="Minimum 2 caractères">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Vitesse (Mb/s)</label>
                            <input type="number" id="vitesse" placeholder="Laisser vide = illimitée" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Durée de validité</label>
                            <select id="duree">
                                <option value="1h">1 heure</option>
                                <option value="12h">12 heures</option>
                                <option value="24h" selected>24 heures</option>
                                <option value="1semaine">1 semaine</option>
                                <option value="1mois">1 mois</option>
                                <option value="Illimite">Illimité</option>
                            </select>
                        </div>
                    </div>
                    
                    <button onclick="enregistrerTicket()" class="btn-enregistrer">Enregistrer le ticket</button>
                </div>
                
                <div class="users-table-section">
                    <h3>Liste des utilisateurs</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Utilisateur</th>
                                    <th>Vitesse</th>
                                    <th>Durée</th>
                                    <th>Statut</th>
                                    <th>MAC</th>
                                    <th>Expiration</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr>
                                    <td colspan="6" style="text-align: center;">Chargement...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let users = [];
        
        function loadUsers() {
            const stored = localStorage.getItem('sisco_users');
            if (stored) {
                users = JSON.parse(stored);
            } else {
                users = [
                    { username: "admin", password: "admin123", speed: "", duration: "24h", blocked: false, mac: "AA:BB:CC:DD:EE:FF", firstUse: Date.now() - 3600000, expires: Date.now() + 82800000 },
                    { username: "client01", password: "1234", speed: "10", duration: "1semaine", blocked: false, mac: null, firstUse: null, expires: null },
                    { username: "test", password: "test", speed: "", duration: "1h", blocked: true, mac: null, firstUse: null, expires: null }
                ];
                saveUsers();
            }
            refreshUI();
        }
        
        function saveUsers() {
            localStorage.setItem('sisco_users', JSON.stringify(users));
        }
        
        function refreshUI() {
            populateDropdown();
            populateTable();
        }
        
        function populateDropdown() {
            const select = document.getElementById('userSelect');
            select.innerHTML = '<option value="">-- Sélectionner --</option>';
            
            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user.username;
                let statusText = '';
                if (user.blocked) statusText = ' [Bloqué]';
                else if (user.firstUse) statusText = ' [Actif]';
                else statusText = ' [Inactif]';
                option.textContent = user.username + statusText;
                select.appendChild(option);
            });
        }
        
        function populateTable() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Aucun utilisateur</td></tr>';
                return;
            }
            
            users.forEach(user => {
                const row = tbody.insertRow();
                
                row.insertCell(0).textContent = user.username;
                row.insertCell(1).textContent = user.speed ? user.speed + ' Mb/s' : 'Illimitée';
                
                let dureeText = '';
                switch(user.duration) {
                    case '1h': dureeText = '1 heure'; break;
                    case '12h': dureeText = '12 heures'; break;
                    case '24h': dureeText = '24 heures'; break;
                    case '1semaine': dureeText = '1 semaine'; break;
                    case '1mois': dureeText = '1 mois'; break;
                    case 'Illimite': dureeText = 'Illimité'; break;
                    default: dureeText = user.duration;
                }
                row.insertCell(2).textContent = dureeText;
                
                let statusText = '';
                let statusClass = '';
                if (user.blocked) {
                    statusText = 'Bloqué';
                    statusClass = 'status-blocked';
                } else if (user.firstUse && user.expires && Date.now() > user.expires && user.duration !== 'Illimite') {
                    statusText = 'Expiré';
                    statusClass = 'status-expired';
                } else if (user.firstUse) {
                    statusText = 'En ligne';
                    statusClass = 'status-online';
                } else {
                    statusText = 'Jamais connecté';
                    statusClass = 'status-offline';
                }
                const statusCell = row.insertCell(3);
                statusCell.textContent = statusText;
                statusCell.className = statusClass;
                
                row.insertCell(4).textContent = user.mac || '--';
                
                let expirationText = '--';
                if (user.expires && user.duration !== 'Illimite') {
                    const date = new Date(user.expires);
                    expirationText = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
                    if (Date.now() > user.expires) expirationText += ' (Expiré)';
                } else if (user.duration === 'Illimite') {
                    expirationText = 'Illimité';
                } else if (!user.firstUse) {
                    expirationText = 'Non utilisé';
                }
                row.insertCell(5).textContent = expirationText;
            });
        }
        
        function showMessage(text, isSuccess) {
            const msgDiv = document.getElementById('globalMessage');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + (isSuccess ? 'message-success' : 'message-error');
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 4000);
        }
        
        function getSelectedUser() {
            const select = document.getElementById('userSelect');
            if (!select.value) return null;
            return users.find(u => u.username === select.value);
        }
        
        function bloquerUser() {
            const user = getSelectedUser();
            if (!user) {
                showMessage('Veuillez sélectionner un utilisateur', false);
                return;
            }
            user.blocked = true;
            saveUsers();
            refreshUI();
            showMessage(user.username + ' a été bloqué - Accès immédiatement coupé', true);
        }
        
        function debloquerUser() {
            const user = getSelectedUser();
            if (!user) {
                showMessage('Veuillez sélectionner un utilisateur', false);
                return;
            }
            user.blocked = false;
            saveUsers();
            refreshUI();
            showMessage(user.username + ' a été débloqué - Accès rétabli', true);
        }
        
        function modifierUser() {
            const user = getSelectedUser();
            if (!user) {
                showMessage('Veuillez sélectionner un utilisateur', false);
                return;
            }
            
            document.getElementById('nomUtilisateur').value = user.username;
            document.getElementById('motDePasse').value = user.password;
            document.getElementById('vitesse').value = user.speed || '';
            document.getElementById('duree').value = user.duration || '24h';
            
            showMessage('Données de ' + user.username + ' chargées - Modifiez puis Enregistrer', true);
        }
        
        function supprimerUser() {
            const user = getSelectedUser();
            if (!user) {
                showMessage('Veuillez sélectionner un utilisateur', false);
                return;
            }
            
            if (confirm('Supprimer définitivement ' + user.username + ' ?\nL\'utilisateur sera immédiatement hors connexion.')) {
                users = users.filter(u => u.username !== user.username);
                saveUsers();
                refreshUI();
                document.getElementById('nomUtilisateur').value = '';
                document.getElementById('motDePasse').value = '';
                document.getElementById('vitesse').value = '';
                showMessage(user.username + ' a été supprimé', true);
            }
        }
        
        function enregistrerTicket() {
            const username = document.getElementById('nomUtilisateur').value.trim();
            const password = document.getElementById('motDePasse').value.trim();
            const speed = document.getElementById('vitesse').value.trim();
            const duration = document.getElementById('duree').value;
            
            if (!username) {
                showMessage('Nom d\'utilisateur obligatoire', false);
                return;
            }
            if (!password || password.length < 2) {
                showMessage('Mot de passe obligatoire (minimum 2 caractères)', false);
                return;
            }
            
            const existingIndex = users.findIndex(u => u.username === username);
            
            if (existingIndex !== -1) {
                users[existingIndex].password = password;
                users[existingIndex].speed = speed || null;
                users[existingIndex].duration = duration;
                saveUsers();
                showMessage('Compte ' + username + ' modifié avec succès', true);
            } else {
                users.push({
                    username: username,
                    password: password,
                    speed: speed || null,
                    duration: duration,
                    blocked: false,
                    mac: null,
                    firstUse: null,
                    expires: null
                });
                saveUsers();
                showMessage('Nouveau ticket créé pour ' + username, true);
            }
            
            document.getElementById('nomUtilisateur').value = '';
            document.getElementById('motDePasse').value = '';
            document.getElementById('vitesse').value = '';
            
            refreshUI();
        }
        
        loadUsers();
        
        console.log('Page administration SISCO-WIFI chargee');
    </script>
</body>
</html>
